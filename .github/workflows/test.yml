name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_alibaba_cloud
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Setup environment
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/ai_alibaba_cloud?schema=public" >> .env
          echo "DB_USER=postgres" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_NAME=ai_alibaba_cloud" >> .env
          echo "DB_PASSWORD=postgres" >> .env
          echo "DB_PORT=5432" >> .env
          echo "PORT=3000" >> .env
      
      - name: Run database migrations
        run: bunx prisma migrate deploy
      
      - name: Build application
        run: bun run build
      
      - name: Start application
        run: |
          # Start the application in the background
          bun run start > app.log 2>&1 &
          APP_PID=$!
          
          # Wait for the application to start
          sleep 10
          
          # Check if the application is running
          if curl -f http://localhost:3000/api/health; then
            echo "Application started successfully"
          else
            echo "Application failed to start"
            kill $APP_PID
            exit 1
          fi
      
      - name: Run tests
        run: bun test > test-results.log 2>&1 || true
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            dist/
            app.log
            test-results.log
          retention-days: 5
      
      - name: Upload Prisma schema
        uses: actions/upload-artifact@v3
        with:
          name: prisma-schema
          path: prisma/schema.prisma
          retention-days: 5
      
      - name: Upload environment configuration
        uses: actions/upload-artifact@v3
        with:
          name: env-config
          path: .env
          retention-days: 5 